name: ZeroLag CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:
    name: Verify desktop and server
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run standard checks
        run: npm run ci

      - name: Run strict SQLite server readiness with private env sample
        shell: pwsh
        run: |
          $strictRoot = Join-Path $env:RUNNER_TEMP "zerolag-strict"
          $stateDir = Join-Path $strictRoot "state"
          $backupDir = Join-Path $strictRoot "backups"
          New-Item -ItemType Directory -Force -Path $stateDir | Out-Null
          New-Item -ItemType Directory -Force -Path $backupDir | Out-Null
          $jsonState = Join-Path $stateDir "server-state.json"
          $sqliteState = Join-Path $stateDir "server-state.sqlite"
          $sqliteBackup = Join-Path $backupDir "server-state-backup.sqlite"

          npm run server:migrate-sqlite -- --input $jsonState --output $sqliteState --allow-empty
          npm run server:backup-sqlite -- --input $sqliteState --output $sqliteBackup

          $runtimeSessionPrivateKeyB64 = node -e "const crypto=require('crypto'); const { privateKey }=crypto.generateKeyPairSync('rsa',{modulusLength:2048}); process.stdout.write(Buffer.from(privateKey.export({type:'pkcs8',format:'pem'})).toString('base64'));"
          $envFile = Join-Path $strictRoot "server.env"
          @(
            "ZEROLAG_SERVER_SECRET=zl_server_ci_abcdefghijklmnopqrstuvwxyz1234567890",
            "ZEROLAG_ADMIN_SECRET=zl_admin_ci_abcdefghijklmnopqrstuvwxyz1234567890",
            "ZEROLAG_PAYMENT_WEBHOOK_SECRET=zl_payment_ci_abcdefghijklmnopqrstuvwxyz1234567890",
            "ZEROLAG_RUNTIME_SESSION_KEY_VERSION=runtime-session-v1",
            "ZEROLAG_RUNTIME_SESSION_PROOF_ALGORITHM=RSA-SHA256",
            "ZEROLAG_RUNTIME_SESSION_PRIVATE_KEY_B64=$runtimeSessionPrivateKeyB64",
            "ZEROLAG_SERVER_HOST=0.0.0.0",
            "ZEROLAG_SERVER_PORT=8787",
            "ZEROLAG_SERVER_STATE_PATH=$jsonState",
            "ZEROLAG_SERVER_BACKUP_DIR=$backupDir",
            "ZEROLAG_STATE_STORE=sqlite",
            "ZEROLAG_SQLITE_STATE_PATH=$sqliteState",
            "ZEROLAG_SQLITE_BACKUP_DIR=$backupDir",
            "ZEROLAG_SQLITE_BACKUP_MAX_AGE_HOURS=24",
            "ZEROLAG_PAYMENT_PROVIDER=wechat_pay",
            "ZEROLAG_PAYMENT_ALLOWED_PROVIDERS=wechat_pay",
            "ZEROLAG_PAYMENT_URL_TEMPLATE=https://pay.zerolag.test/checkout/{orderId}",
            "ZEROLAG_PAYMENT_MESSAGE=Open the secure checkout page to finish payment.",
            "ZEROLAG_RATE_LIMIT_DISABLED=0",
            "ZEROLAG_SERVER_BACKUP_DISABLED=0",
            "ZEROLAG_MAINTENANCE_DISABLED=0"
          ) | Set-Content -Path $envFile -Encoding UTF8

          $env:ZEROLAG_ENV_FILE = $envFile
          npm run server:env-check -- --profile sqlite --strict
          npm run server:check-sqlite-backups -- --dir $backupDir --max-age-hours 24
          npm run server:check:strict
          npm run server:smoke

      - name: Generate CI release reports
        if: always()
        shell: pwsh
        run: |
          $reportDir = Join-Path $env:RUNNER_TEMP "zerolag-ci-reports"
          New-Item -ItemType Directory -Force -Path $reportDir | Out-Null

          $serverReport = Join-Path $reportDir "server-deployment-report.md"
          $serverReportJson = Join-Path $reportDir "server-deployment-report.json"

          npm run server:deployment-report -- --output $serverReport
          npm run server:deployment-report:json -- --output $serverReportJson
          npm run release:report -- --output-dir $reportDir

      - name: Upload CI release reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zerolag-ci-reports
          path: ${{ runner.temp }}/zerolag-ci-reports
          if-no-files-found: warn
          retention-days: 14
